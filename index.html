<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Center — Abdullah Ishaq</title>
  <meta name="description" content="I build AI systems that handle your operations, content, and customers — so you can focus on growth. AI automation for African businesses.">
  <meta name="author" content="Abdullah Ishaq">
  <meta property="og:title" content="AI Center — Abdullah Ishaq">
  <meta property="og:description" content="I build AI systems that handle your operations, content, and customers — so you can focus on growth.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://abdullahishaq.tech">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ──────────────────────────────────────────────────────────── */
    :root {
      --w:       #FAFAF8;
      --b:       #0C0C0B;
      --g1:      #141412;
      --g2:      #2A2A27;
      --g3:      #5A5A56;
      --g4:      #A0A09B;
      --g5:      #DEDED9;
      --g6:      #F0F0EB;
      --gold:    #C8960C;
      --gold-lt: #E8B020;
      --gold-d:  #C8960C18;
      --syne:    'Syne', sans-serif;
      --mono:    'DM Mono', monospace;
      --ease:    cubic-bezier(0.16,1,0.3,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    img, svg { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; }
    a { color: inherit; text-decoration: none; }

    body {
      font-family: var(--mono);
      background: var(--w);
      color: var(--b);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ──────────────────────────────────────────────────────────── */
    .cursor {
      position: fixed; top: 0; left: 0;
      width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transition: transform 0.15s var(--ease), opacity 0.2s;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0;
      width: 32px; height: 32px;
      border: 1px solid var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transition: transform 0.35s var(--ease), width 0.3s var(--ease), height 0.3s var(--ease), opacity 0.2s;
      transform: translate(-50%, -50%); opacity: 0.5;
    }

    /* ── GRAIN ───────────────────────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9990; opacity: 0.35; mix-blend-mode: multiply;
    }

    /* ── SCROLL PROGRESS ─────────────────────────────────────────────────── */
    #spb {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: var(--gold); z-index: 9997;
      transition: width 0.1s linear;
    }

    /* ── PAGE TRANSITION ─────────────────────────────────────────────────── */
    #page-root {
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    #page-root.fade-out { opacity: 0; }

    /* ── NAV ─────────────────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 900; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: rgba(250,250,248,0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--g5);
    }
    nav.dark {
      background: rgba(12,12,11,0.92);
      border-bottom: 1px solid var(--g2);
    }
    .nav-logo {
      font-family: var(--syne); font-size: 15px; font-weight: 800;
      letter-spacing: -0.02em; color: var(--b);
      display: flex; align-items: center; gap: 6px;
    }
    nav.dark .nav-logo { color: var(--w); }
    .nav-logo-dot {
      width: 7px; height: 7px; background: var(--gold);
      border-radius: 50%; animation: blink 3s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
      color: var(--g3); transition: color 0.2s; position: relative;
    }
    nav.dark .nav-links a { color: var(--g4); }
    nav.dark .nav-links a:hover { color: var(--w); }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.25s var(--ease);
    }
    .nav-links a:hover { color: var(--b); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      letter-spacing: 0.06em; color: var(--b) !important;
      background: var(--gold); padding: 9px 20px; border: none;
      transition: background 0.2s, transform 0.2s;
    }
    .nav-cta:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .nav-cta::after { display: none !important; }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 4px;
    }
    .hamburger span { display: block; width: 22px; height: 1px; background: var(--b); transition: transform 0.3s var(--ease), opacity 0.3s; }
    nav.dark .hamburger span { background: var(--w); }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; inset: 58px 0 0 0;
      background: var(--w); z-index: 800;
      flex-direction: column; padding: 40px 32px; gap: 32px;
      border-top: 1px solid var(--g5);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--syne); font-size: 28px; font-weight: 700;
      letter-spacing: -0.03em; color: var(--b); transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--gold); }

    /* ── REVEAL ──────────────────────────────────────────────────────────── */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.75s var(--ease), transform 0.75s var(--ease);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.1s; }
    .reveal-d2 { transition-delay: 0.2s; }
    .reveal-d3 { transition-delay: 0.3s; }
    .reveal-d4 { transition-delay: 0.4s; }

    /* ── SECTION WRAPPER ─────────────────────────────────────────────────── */
    section { padding: 120px 48px; }
    .inner { max-width: 1100px; margin: 0 auto; }
    .sec-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--g4); margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .sec-label::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--gold); }
    .sec-title {
      font-family: var(--syne); font-size: clamp(32px,4.5vw,56px); font-weight: 800;
      letter-spacing: -0.04em; line-height: 1.08; color: var(--b); margin-bottom: 20px;
    }
    .sec-title em { color: var(--gold); font-style: normal; }
    .sec-sub { font-size: 15px; line-height: 1.75; color: var(--g3); max-width: 540px; }

    /* ── HERO ────────────────────────────────────────────────────────────── */
    #home {
      min-height: 100vh; display: flex; align-items: center;
      padding: 0 48px; position: relative; overflow: hidden;
      border-bottom: 1px solid var(--g5);
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; padding-top: 80px; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold);
      padding: 6px 14px; margin-bottom: 40px;
      animation: fadeUp 0.8s var(--ease) 0.1s both;
    }
    .hero-tag-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .hero-headline {
      font-family: var(--syne); font-size: clamp(52px,9vw,130px); font-weight: 800;
      letter-spacing: -0.05em; line-height: 0.95; color: var(--b); margin-bottom: 40px;
    }
    .hero-headline .line { display: block; overflow: hidden; }
    .hero-headline .line span { display: block; animation: slideUp 0.9s var(--ease) both; }
    .hero-headline .line:nth-child(1) span { animation-delay: 0.2s; }
    .hero-headline .line:nth-child(2) span { animation-delay: 0.35s; }
    .hero-headline .line:nth-child(3) span { animation-delay: 0.5s; }
    @keyframes slideUp { from{transform:translateY(110%)} to{transform:translateY(0)} }
    .hero-headline em { color: var(--gold); font-style: normal; }
    .hero-sub {
      font-size: clamp(15px,1.6vw,18px); line-height: 1.7; color: var(--g3);
      max-width: 520px; margin-bottom: 48px;
      animation: fadeUp 0.8s var(--ease) 0.65s both;
    }
    .hero-actions {
      display: flex; gap: 16px; flex-wrap: wrap;
      animation: fadeUp 0.8s var(--ease) 0.8s both;
    }
    .btn-fill {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.04em; padding: 15px 32px;
      background: var(--b); color: var(--w); border: 1px solid var(--b);
      cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.2s;
      display: inline-block;
    }
    .btn-fill:hover { background: var(--gold); border-color: var(--gold); color: var(--b); transform: translateY(-2px); }
    .btn-ghost {
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.04em;
      padding: 15px 32px; background: transparent; color: var(--b);
      border: 1px solid var(--g5); cursor: pointer;
      transition: border-color 0.2s, transform 0.2s; display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--b); transform: translateY(-2px); }
    .hero-deco {
      position: absolute; right: -80px; top: 50%; transform: translateY(-50%);
      width: 500px; height: 500px;
      animation: fadeUp 1s var(--ease) 0.5s both; pointer-events: none;
    }
    .hero-deco-ring {
      position: absolute; border: 1px solid var(--g5); border-radius: 50%;
      animation: spin linear infinite;
    }
    .hero-deco-ring:nth-child(1) { inset: 0; animation-duration: 40s; }
    .hero-deco-ring:nth-child(2) { inset: 60px; animation-duration: 30s; animation-direction: reverse; }
    .hero-deco-ring:nth-child(3) { inset: 130px; animation-duration: 20s; border-color: var(--gold); border-style: dashed; }
    .hero-deco-ring:nth-child(4) { inset: 200px; animation-duration: 15s; animation-direction: reverse; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .hero-deco-center { position: absolute; inset: 210px; background: var(--gold); border-radius: 50%; opacity: 0.15; }
    .hero-stats {
      display: flex; gap: 0; margin-top: 64px;
      border-top: 1px solid var(--g5); padding-top: 40px;
      animation: fadeUp 0.8s var(--ease) 0.9s both;
    }
    .hero-stat { flex: 1; padding-right: 40px; border-right: 1px solid var(--g5); margin-right: 40px; }
    .hero-stat:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .stat-num {
      font-family: var(--syne); font-size: clamp(28px,3.5vw,44px); font-weight: 800;
      letter-spacing: -0.04em; color: var(--b); line-height: 1; margin-bottom: 6px;
    }
    .stat-num em { color: var(--gold); font-style: normal; }
    .stat-label { font-size: 12px; color: var(--g3); line-height: 1.5; }

    /* ── MARQUEE ─────────────────────────────────────────────────────────── */
    .marquee-wrap {
      border-top: 1px solid var(--g5); border-bottom: 1px solid var(--g5);
      padding: 18px 0; overflow: hidden; background: var(--g6);
    }
    .marquee-track { display: flex; animation: marquee 28s linear infinite; white-space: nowrap; }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .marquee-item {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--g4); padding: 0 32px;
      display: flex; align-items: center; gap: 32px; flex-shrink: 0;
    }
    .marquee-item::after { content: ''; display: inline-block; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

    /* ── SERVICES ────────────────────────────────────────────────────────── */
    #services { border-bottom: 1px solid var(--g5); }
    .services-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 0;
      margin-top: 64px; border: 1px solid var(--g5);
    }
    .service-card {
      padding: 48px 40px; border-right: 1px solid var(--g5); border-bottom: 1px solid var(--g5);
      transition: background 0.25s; position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 0; height: 2px; background: var(--gold); transition: width 0.4s var(--ease);
    }
    .service-card:hover { background: var(--g6); }
    .service-card:hover::before { width: 100%; }
    .service-card:nth-child(2n) { border-right: none; }
    .service-card:nth-child(3), .service-card:nth-child(4) { border-bottom: none; }
    .service-num { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 24px; }
    .service-icon { width: 40px; height: 40px; margin-bottom: 20px; }
    .service-title { font-family: var(--syne); font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 14px; line-height: 1.2; }
    .service-desc { font-size: 13px; line-height: 1.75; color: var(--g3); }
    .service-tools { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 24px; }
    .tool-chip {
      font-size: 10px; letter-spacing: 0.06em; color: var(--g3);
      border: 1px solid var(--g5); padding: 3px 10px; background: var(--w);
      transition: border-color 0.2s, color 0.2s;
    }
    .service-card:hover .tool-chip { border-color: var(--gold); color: var(--gold); }

    /* ── WORK ────────────────────────────────────────────────────────────── */
    #work { border-bottom: 1px solid var(--g5); background: var(--b); }
    .work-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      margin-top: 64px; background: var(--g2); border: 1px solid var(--g2);
    }
    .work-card { background: var(--g1); padding: 48px 40px; transition: background 0.25s; position: relative; overflow: hidden; }
    .work-card:hover { background: var(--g2); }
    .work-card-full { grid-column: 1 / -1; }
    .work-tag { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; font-family: var(--mono); }
    .work-title { font-family: var(--syne); font-size: clamp(20px,2.5vw,28px); font-weight: 700; letter-spacing: -0.03em; color: var(--w); margin-bottom: 16px; line-height: 1.2; }
    .work-desc { font-size: 13px; line-height: 1.75; color: var(--g4); margin-bottom: 28px; max-width: 480px; }
    .work-stats { display: flex; gap: 32px; margin-bottom: 28px; flex-wrap: wrap; }
    .work-stat-item { display: flex; flex-direction: column; gap: 4px; }
    .work-stat-num { font-family: var(--syne); font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: var(--gold); line-height: 1; }
    .work-stat-label { font-size: 11px; color: var(--g4); }
    .work-link {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--w);
      display: inline-flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--g2); padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s; cursor: pointer;
    }
    .work-link:hover { color: var(--gold); border-color: var(--gold); }
    .work-link-arrow { display: inline-block; transition: transform 0.2s var(--ease); }
    .work-link:hover .work-link-arrow { transform: translateX(4px); }

    /* ── BLOG ────────────────────────────────────────────────────────────── */
    #blog { border-bottom: 1px solid var(--g5); }
    .blog-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 56px; flex-wrap: wrap; gap: 24px; }
    .blog-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--g5); border: 1px solid var(--g5); }
    .blog-card { background: var(--w); padding: 36px 32px; transition: background 0.2s; position: relative; display: block; }
    .blog-card:hover { background: var(--g6); }
    .blog-card::before { content: ''; position: absolute; top: 0; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.4s var(--ease); }
    .blog-card:hover::before { width: 100%; }
    .blog-cat { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; font-family: var(--mono); }
    .blog-title { font-family: var(--syne); font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 12px; line-height: 1.3; }
    .blog-excerpt { font-size: 12px; line-height: 1.7; color: var(--g3); margin-bottom: 20px; }
    .blog-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--g5); padding-top: 16px; }
    .blog-time { font-size: 11px; color: var(--g4); }
    .blog-arrow { font-size: 12px; color: var(--g4); transition: color 0.2s, transform 0.2s; }
    .blog-card:hover .blog-arrow { color: var(--gold); transform: translateX(4px); }

    /* ── LABS ────────────────────────────────────────────────────────────── */
    #labs { border-bottom: 1px solid var(--g5); background: var(--g6); }
    .labs-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 56px; flex-wrap: wrap; gap: 24px; }
    .labs-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .lab-card { background: var(--w); border: 1px solid var(--g5); padding: 36px 32px; transition: border-color 0.25s, transform 0.25s; position: relative; display: block; }
    .lab-card:hover { border-color: var(--gold); transform: translateY(-4px); }
    .lab-status {
      display: inline-block; font-size: 9px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 3px 10px; margin-bottom: 20px; font-family: var(--mono);
    }
    .lab-status.live { background: var(--gold); color: var(--b); }
    .lab-status.beta { background: var(--g5); color: var(--g2); }
    .lab-status.soon { background: var(--g6); color: var(--g4); border: 1px solid var(--g5); }
    .lab-title { font-family: var(--syne); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 12px; line-height: 1.25; }
    .lab-desc { font-size: 13px; line-height: 1.7; color: var(--g3); margin-bottom: 24px; }
    .lab-cta { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--b); border: 1px solid var(--g5); padding: 10px 18px; display: inline-block; transition: border-color 0.2s, background 0.2s; cursor: pointer; }
    .lab-cta:hover { border-color: var(--gold); background: var(--gold-d); }
    .lab-cta.disabled { color: var(--g4); cursor: default; }
    .lab-cta.disabled:hover { border-color: var(--g5); background: transparent; }

    /* ── FRAMEWORKS ──────────────────────────────────────────────────────── */
    #frameworks { border-bottom: 1px solid var(--g5); }
    .fw-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 56px; flex-wrap: wrap; gap: 24px; }
    .fw-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--g5); border: 1px solid var(--g5); }
    .fw-card { background: var(--w); padding: 32px 28px; transition: background 0.2s; }
    .fw-card:hover { background: var(--g6); }
    .fw-badge { display: inline-block; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; margin-bottom: 20px; font-family: var(--mono); }
    .fw-badge.free { background: var(--gold); color: var(--b); }
    .fw-badge.premium { background: var(--b); color: var(--w); }
    .fw-title { font-family: var(--syne); font-size: 16px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 10px; line-height: 1.3; }
    .fw-desc { font-size: 12px; line-height: 1.7; color: var(--g3); margin-bottom: 20px; }
    .fw-link { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--gold); display: inline-flex; align-items: center; gap: 6px; transition: gap 0.2s; }
    .fw-link:hover { gap: 12px; }

    /* ── ABOUT ───────────────────────────────────────────────────────────── */
    #about { border-bottom: 1px solid var(--g5); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; margin-top: 64px; }
    .about-text p { font-size: 15px; line-height: 1.85; color: var(--g2); margin-bottom: 24px; }
    .about-text p:last-of-type { margin-bottom: 36px; }
    .about-text strong { color: var(--b); font-weight: 500; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--b); border: 1px solid var(--g5); padding: 6px 14px; transition: border-color 0.2s, color 0.2s, background 0.2s; }
    .skill-tag:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-d); }
    .about-portrait { position: relative; height: 440px; }
    .portrait-frame { position: absolute; border: 1px solid var(--g5); }
    .portrait-frame:nth-child(1) { inset: 0; background: var(--g6); }
    .portrait-frame:nth-child(2) { top: 32px; left: 32px; right: -32px; bottom: -32px; border-color: var(--gold); opacity: 0.3; z-index: -1; }
    .portrait-initials { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .portrait-ai { font-family: var(--syne); font-size: 80px; font-weight: 800; letter-spacing: -0.06em; color: var(--b); line-height: 1; }
    .portrait-name { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--g3); }
    .portrait-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
    .about-timeline { margin-top: 48px; }
    .about-timeline-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--g4); margin-bottom: 20px; }
    .timeline-item { display: flex; gap: 20px; padding-bottom: 24px; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: 5px; top: 12px; bottom: 0; width: 1px; background: var(--g5); }
    .timeline-item:last-child::before { display: none; }
    .timeline-dot { width: 11px; height: 11px; border: 1px solid var(--gold); background: var(--w); border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .timeline-dot.active { background: var(--gold); }
    .timeline-content { flex: 1; }
    .timeline-role { font-family: var(--syne); font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--b); margin-bottom: 2px; }
    .timeline-org { font-size: 12px; color: var(--gold); margin-bottom: 4px; }
    .timeline-note { font-size: 12px; color: var(--g3); line-height: 1.5; }

    /* ── CONTACT ─────────────────────────────────────────────────────────── */
    #contact { background: var(--b); border-bottom: none; }
    #contact .sec-label { color: var(--g3); }
    #contact .sec-label::before { background: var(--gold); }
    #contact .sec-title { color: var(--w); }
    #contact .sec-sub { color: var(--g4); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 64px; align-items: start; }
    .contact-info { display: flex; flex-direction: column; gap: 32px; }
    .contact-item { display: flex; flex-direction: column; gap: 6px; padding-bottom: 32px; border-bottom: 1px solid var(--g2); }
    .contact-item:last-of-type { border-bottom: none; padding-bottom: 0; }
    .contact-item-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--g3); font-family: var(--mono); }
    .contact-item-value { font-family: var(--syne); font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--w); transition: color 0.2s; }
    .contact-item-value:hover { color: var(--gold); }
    .contact-item-note { font-size: 12px; color: var(--g3); }
    .contact-cta-row { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .btn-fill-gold { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; padding: 16px 28px; background: var(--gold); color: var(--b); border: 1px solid var(--gold); cursor: pointer; transition: background 0.2s; text-align: center; display: block; }
    .btn-fill-gold:hover { background: var(--gold-lt); }
    .btn-ghost-white { font-family: var(--mono); font-size: 13px; letter-spacing: 0.04em; padding: 16px 28px; background: transparent; color: var(--w); border: 1px solid var(--g2); cursor: pointer; transition: border-color 0.2s; text-align: center; display: block; }
    .btn-ghost-white:hover { border-color: var(--g3); }
    .contact-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--g3); font-family: var(--mono); }
    .form-input, .form-textarea { font-family: var(--mono); font-size: 14px; color: var(--w); background: var(--g1); border: 1px solid var(--g2); padding: 14px 16px; outline: none; transition: border-color 0.2s; width: 100%; resize: none; }
    .form-input:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--g3); }
    .form-textarea { height: 120px; }
    .form-submit { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; padding: 16px; background: var(--gold); color: var(--b); border: none; cursor: pointer; transition: background 0.2s; width: 100%; }
    .form-submit:hover { background: var(--gold-lt); }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    footer {
      background: var(--g1); border-top: 1px solid var(--g2);
      padding: 32px 48px; display: flex;
      justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
    }
    .footer-left { display: flex; flex-direction: column; gap: 6px; }
    .footer-brand { font-family: var(--syne); font-size: 14px; font-weight: 800; letter-spacing: -0.02em; color: var(--w); }
    .footer-brand em { color: var(--gold); font-style: normal; }
    .footer-copy { font-size: 11px; color: var(--g3); }
    .footer-links { display: flex; gap: 24px; list-style: none; flex-wrap: wrap; }
    .footer-links a { font-size: 12px; color: var(--g3); transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }

    /* ── SUB-PAGE SHARED ─────────────────────────────────────────────────── */
    .page-hero {
      padding: 140px 48px 80px;
      border-bottom: 1px solid var(--g5);
      background: var(--w);
    }
    .page-hero.dark {
      background: var(--b);
      border-bottom-color: var(--g2);
    }
    .page-hero .inner { max-width: 900px; }
    .back-link {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--g4);
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 40px; transition: color 0.2s;
      cursor: pointer;
    }
    .back-link:hover { color: var(--gold); }
    .back-link::before { content: '←'; }
    .page-title {
      font-family: var(--syne); font-size: clamp(36px,6vw,72px); font-weight: 800;
      letter-spacing: -0.05em; line-height: 0.95; margin-bottom: 28px;
    }
    .page-title em { color: var(--gold); font-style: normal; }
    .page-meta {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
      color: var(--g4); margin-top: 32px;
    }
    .page-meta span { display: flex; align-items: center; gap: 6px; }
    .page-meta-dot { width: 3px; height: 3px; background: var(--gold); border-radius: 50%; }

    /* Article body */
    .article-body {
      padding: 80px 48px;
      max-width: 760px;
      margin: 0 auto;
    }
    .article-body h2 {
      font-family: var(--syne); font-size: 24px; font-weight: 700;
      letter-spacing: -0.03em; color: var(--b);
      margin: 56px 0 20px;
    }
    .article-body h3 {
      font-family: var(--syne); font-size: 18px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--b); margin: 36px 0 14px;
    }
    .article-body p { font-size: 15px; line-height: 1.85; color: var(--g2); margin-bottom: 24px; }
    .article-body strong { color: var(--b); font-weight: 500; }
    .article-body em { color: var(--gold); font-style: normal; }
    .article-body ul { margin: 0 0 24px 0; padding: 0; list-style: none; }
    .article-body ul li {
      font-size: 15px; line-height: 1.75; color: var(--g2);
      padding: 10px 0 10px 24px; border-bottom: 1px solid var(--g6);
      position: relative;
    }
    .article-body ul li::before { content: '—'; position: absolute; left: 0; color: var(--gold); }
    .article-callout {
      border-left: 2px solid var(--gold); padding: 20px 28px; margin: 40px 0;
      background: var(--g6); font-size: 16px; line-height: 1.7; color: var(--b);
      font-style: italic;
    }

    /* Case study metrics bar */
    .case-metrics {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 0;
      border: 1px solid var(--g5); margin: 64px 0;
    }
    .case-metric {
      padding: 32px 28px; border-right: 1px solid var(--g5);
      text-align: center;
    }
    .case-metric:last-child { border-right: none; }
    .case-metric-num { font-family: var(--syne); font-size: 36px; font-weight: 800; letter-spacing: -0.05em; color: var(--gold); line-height: 1; margin-bottom: 8px; }
    .case-metric-label { font-size: 12px; color: var(--g3); line-height: 1.4; }
    .case-stack {
      display: flex; flex-wrap: wrap; gap: 8px; margin: 32px 0;
    }
    .case-chip {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
      color: var(--b); border: 1px solid var(--g5); padding: 6px 14px;
      background: var(--g6);
    }

    /* ── READINESS SCORE TOOL ────────────────────────────────────────────── */
    .quiz-wrap { padding: 80px 48px; max-width: 760px; margin: 0 auto; }
    .quiz-progress-bar {
      width: 100%; height: 2px; background: var(--g5); margin-bottom: 64px; position: relative;
    }
    .quiz-progress-fill { height: 100%; background: var(--gold); transition: width 0.4s var(--ease); }
    .quiz-q-num { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--g4); margin-bottom: 12px; }
    .quiz-question { font-family: var(--syne); font-size: clamp(22px,3vw,32px); font-weight: 700; letter-spacing: -0.03em; color: var(--b); line-height: 1.2; margin-bottom: 40px; }
    .quiz-options { display: flex; flex-direction: column; gap: 12px; }
    .quiz-option {
      border: 1px solid var(--g5); padding: 18px 24px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 14px; color: var(--g2); line-height: 1.5;
      display: flex; align-items: center; gap: 16px;
    }
    .quiz-option:hover { border-color: var(--gold); background: var(--g6); }
    .quiz-option.selected { border-color: var(--gold); background: var(--gold-d); color: var(--b); }
    .quiz-option-letter {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      color: var(--gold); flex-shrink: 0; width: 20px;
    }
    .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
    .quiz-btn {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
      padding: 14px 28px; cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--g5); background: transparent; color: var(--b);
    }
    .quiz-btn.primary { background: var(--b); color: var(--w); border-color: var(--b); }
    .quiz-btn.primary:hover { background: var(--gold); border-color: var(--gold); color: var(--b); }
    .quiz-btn:hover { border-color: var(--b); }
    .quiz-result { text-align: center; padding: 40px 0; }
    .quiz-score-ring {
      width: 160px; height: 160px; border-radius: 50%;
      border: 2px solid var(--gold); margin: 0 auto 32px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .quiz-score-num { font-family: var(--syne); font-size: 48px; font-weight: 800; letter-spacing: -0.05em; color: var(--b); line-height: 1; }
    .quiz-score-denom { font-family: var(--mono); font-size: 12px; color: var(--g4); }
    .quiz-result-title { font-family: var(--syne); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; color: var(--b); margin-bottom: 16px; }
    .quiz-result-desc { font-size: 15px; line-height: 1.75; color: var(--g3); max-width: 540px; margin: 0 auto 40px; }
    .quiz-recommendations { text-align: left; border: 1px solid var(--g5); padding: 32px; margin: 40px 0; }
    .quiz-rec-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--g4); margin-bottom: 20px; }
    .quiz-rec-item { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--g6); font-size: 14px; color: var(--g2); }
    .quiz-rec-item:last-child { border-bottom: none; }
    .quiz-rec-num { font-family: var(--mono); font-size: 10px; color: var(--gold); flex-shrink: 0; padding-top: 2px; }

    /* ── FRAMEWORK PAGE ──────────────────────────────────────────────────── */
    .fw-doc { padding: 80px 48px; max-width: 900px; margin: 0 auto; }
    .fw-doc h2 { font-family: var(--syne); font-size: 22px; font-weight: 700; letter-spacing: -0.03em; color: var(--b); margin: 56px 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--g5); }
    .fw-doc h3 { font-family: var(--syne); font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--b); margin: 32px 0 12px; }
    .fw-doc p { font-size: 14px; line-height: 1.85; color: var(--g2); margin-bottom: 20px; }
    .fw-doc ul { margin: 0 0 20px 0; padding: 0; list-style: none; }
    .fw-doc ul li { font-size: 14px; line-height: 1.7; color: var(--g2); padding: 8px 0 8px 22px; position: relative; border-bottom: 1px solid var(--g6); }
    .fw-doc ul li::before { content: '→'; position: absolute; left: 0; color: var(--gold); font-size: 12px; }
    .fw-step {
      border: 1px solid var(--g5); margin-bottom: 16px;
      display: grid; grid-template-columns: 56px 1fr; gap: 0;
    }
    .fw-step-num { background: var(--b); display: flex; align-items: center; justify-content: center; font-family: var(--syne); font-size: 20px; font-weight: 800; color: var(--gold); }
    .fw-step-body { padding: 24px 28px; }
    .fw-step-title { font-family: var(--syne); font-size: 16px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 8px; }
    .fw-step-desc { font-size: 13px; line-height: 1.7; color: var(--g3); }
    .fw-download-bar {
      position: sticky; bottom: 0; background: var(--b); padding: 20px 48px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--g2); z-index: 100;
    }
    .fw-download-label { font-family: var(--mono); font-size: 12px; color: var(--g4); }
    .fw-download-btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; padding: 12px 24px; background: var(--gold); color: var(--b); border: none; cursor: pointer; transition: background 0.2s; }
    .fw-download-btn:hover { background: var(--gold-lt); }

    /* ── DATA PROTECTION PAGE ────────────────────────────────────────────── */
    .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--g5); border: 1px solid var(--g5); margin: 64px 0; }
    .dp-card { background: var(--w); padding: 36px 32px; }
    .dp-card:hover { background: var(--g6); }
    .dp-card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .dp-card-title { font-family: var(--syne); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); margin-bottom: 10px; }
    .dp-card-desc { font-size: 13px; line-height: 1.7; color: var(--g3); }

    /* ── BLOG LISTING PAGE ───────────────────────────────────────────────── */
    .blog-listing-grid {
      display: grid; grid-template-columns: 1fr; gap: 0;
      border: 1px solid var(--g5); margin-top: 64px;
    }
    .blog-listing-item {
      padding: 36px 40px; border-bottom: 1px solid var(--g5);
      display: grid; grid-template-columns: 1fr auto;
      gap: 24px; align-items: center; transition: background 0.2s;
      cursor: pointer;
    }
    .blog-listing-item:last-child { border-bottom: none; }
    .blog-listing-item:hover { background: var(--g6); }
    .blog-listing-item.disabled { opacity: 0.5; cursor: default; pointer-events: none; }
    .blog-listing-cat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .blog-listing-title { font-family: var(--syne); font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--b); line-height: 1.25; margin-bottom: 8px; }
    .blog-listing-excerpt { font-size: 13px; line-height: 1.6; color: var(--g3); }
    .blog-listing-meta { font-family: var(--mono); font-size: 11px; color: var(--g4); text-align: right; white-space: nowrap; }
    .blog-listing-arrow { font-size: 20px; color: var(--gold); margin-top: 8px; display: block; }

    /* ── LABS LISTING PAGE ───────────────────────────────────────────────── */
    .labs-full-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 64px; }

    /* ── FRAMEWORKS LISTING ──────────────────────────────────────────────── */
    .fw-full-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--g5); border: 1px solid var(--g5); margin-top: 64px; }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      section { padding: 80px 24px; }
      #home { padding: 0 24px; }
      .hero-deco { display: none; }
      .hero-headline { font-size: clamp(44px,10vw,80px); }
      .hero-stats { flex-wrap: wrap; }
      .hero-stat { flex: 1 1 40%; margin-bottom: 24px; }
      .services-grid { grid-template-columns: 1fr; }
      .service-card { border-right: none !important; }
      .service-card:nth-child(3) { border-bottom: 1px solid var(--g5) !important; }
      .work-grid { grid-template-columns: 1fr; }
      .work-card-full { grid-column: 1; }
      .blog-grid { grid-template-columns: 1fr; }
      .labs-grid, .labs-full-grid { grid-template-columns: 1fr; }
      .fw-grid, .fw-full-grid { grid-template-columns: 1fr 1fr; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .about-portrait { height: 280px; }
      .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      footer { padding: 24px; flex-direction: column; align-items: flex-start; }
      .page-hero { padding: 120px 24px 60px; }
      .article-body, .quiz-wrap, .fw-doc { padding: 60px 24px; }
      .case-metrics { grid-template-columns: 1fr 1fr; }
      .case-metric:nth-child(2) { border-right: none; }
      .case-metric:nth-child(3) { border-right: 1px solid var(--g5); }
      .dp-grid { grid-template-columns: 1fr; }
      .fw-download-bar { padding: 16px 24px; }
      .blog-listing-item { grid-template-columns: 1fr; }
      .blog-listing-meta { text-align: left; }
    }
    @media (max-width: 560px) {
      .fw-grid, .fw-full-grid { grid-template-columns: 1fr; }
      .hero-actions { flex-direction: column; }
      .btn-fill, .btn-ghost { width: 100%; text-align: center; }
      .case-metrics { grid-template-columns: 1fr 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>

const nav  = document.getElementById('main-nav');

function navigate(path, push = true) {
  if (push && window.location.pathname !== path) {
    history.pushState({}, '', path);
  }
  root.classList.add('fade-out');
  setTimeout(() => {
    renderPage(path);
    root.classList.remove('fade-out');
    window.scrollTo(0, 0);
    initReveal();
    updateNav(path);
  }, 250);
}

function updateNav(path) {
  if (path === '/') {
    nav.classList.remove('dark');
  } else {
    nav.classList.remove('dark');
  }
}

function scrollToAnchor(id) {
  if (window.location.pathname !== '/') {
    navigate('/');
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 350);
  } else {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

document.addEventListener('click', e => {
  const routeEl = e.target.closest('[data-route]');
  const anchorEl = e.target.closest('[data-anchor]');

  if (routeEl) {
    e.preventDefault();
    navigate(routeEl.dataset.route);
    closeMobileMenu();
    return;
  }
  if (anchorEl) {
    e.preventDefault();
    scrollToAnchor(anchorEl.dataset.anchor);
    closeMobileMenu();
    return;
  }
});

window.addEventListener('popstate', () => navigate(window.location.pathname, false));

function renderAutomationReadiness() {
  return `
  <div class="page-hero">
    <div class="inner">
      <div class="back-link" onclick="navigate('/blog')">All Articles</div>
      <div class="sec-label">Explainer</div>
      <h1 class="page-title">5 Signs Your Business<br>Is Ready for <em>Automation.</em><br>And 3 Signs It Is Not.</h1>
      <div class="page-meta">
        <span>Abdullah Ishaq</span>
        <span class="page-meta-dot"></span>
        <span>4 min read</span>
        <span class="page-meta-dot"></span>
        <span>AI Center</span>
      </div>
    </div>
  </div>

  <div class="article-body">
    <p>Every week someone messages me asking about automation. And every week I have to have the same honest conversation: <strong>most businesses that want automation are not ready for it.</strong> Not because they are too small. Not because the tools are too expensive. But because they have not done the one thing that makes automation possible — they have not documented how their business actually works.</p>

    <p>Automation does not fix broken processes. It accelerates them. If your order intake is chaotic, automating it will give you chaotic orders faster. If your customer communication is inconsistent, a WhatsApp bot will be inconsistently annoying at scale. The tool is only as good as the system it is running on.</p>

    <p>So before we talk about Make.com, Tally forms, Telegram bots, or any of it — here is the honest checklist.</p>

    <h2>5 Signs You Are Ready</h2>

    <h3>1. You already know your process, you just hate doing it</h3>
    <p>The best automation candidates are repetitive tasks that you do the same way every time. If someone asked you right now to write down the exact steps of how a customer orders from you — from first message to delivery — and you could answer in under two minutes, you are ready. Automation needs a process to follow. If you have one in your head but not on paper, write it down first. Then we can build it.</p>

    <h3>2. You are spending more than 5 hours a week on tasks a spreadsheet could handle</h3>
    <p>Manually logging orders. Calculating totals. Copy-pasting customer details from WhatsApp into a notepad. Sending the same "thank you for your order" message 20 times a day. If you can identify more than 5 hours per week of work that is repetitive, rule-based, and digital — you have a strong automation case. The ROI pays off in weeks, not months.</p>

    <h3>3. You have at least 10 customers per week</h3>
    <p>Automation has a setup cost — in time, money, and learning curve. Below 10 customers per week, manual operations are actually more efficient. Above 10, you start to feel the weight. Above 30, manual operations become your biggest growth constraint. If you are handling volume, even moderate volume, the infrastructure investment is worth it.</p>

    <h3>4. You know exactly what data you need to capture</h3>
    <p>Order forms, customer intake, payment confirmation — all of these require knowing what information you actually need from a customer. Name. Phone. Address. Order details. Size. Colour. Quantity. If you can list every field you need to capture, in every transaction, without thinking too hard — you are ready to build a form that captures it automatically.</p>

    <h3>5. You are willing to change how you work, not just add a tool on top</h3>
    <p>This one eliminates more people than any other. Automation is not a layer on top of how you currently operate. It requires you to change your inputs and outputs. If you are not willing to direct customers to a Tally form instead of taking orders by voice note, the system will not hold. If you are not willing to stop answering order questions manually once a bot is doing it, you will undo the automation within a week. The tool requires commitment to the new process.</p>

    <div class="article-callout">Automation is not a layer on top of how you operate. It is a replacement for part of how you operate. The businesses that get this make it work. The ones that do not end up with expensive tools nobody uses.</div>

    <h2>3 Signs You Are Not Ready</h2>

    <h3>1. You do not have a consistent product or service offering</h3>
    <p>If your prices change week to week, your menu changes daily, or your services are entirely bespoke every time — automation cannot help you yet. The tools require consistency to function. A bot cannot quote a price that does not exist. A form cannot capture a field you have not defined. Get your offering stable first. Then systematise it.</p>

    <h3>2. You handle every customer differently</h3>
    <p>Some businesses run on relationships and individual treatment. A personal stylist, a bespoke tailor, a high-end events planner. If every customer gets a genuinely different experience because that is the nature of the product — automation will commoditise what makes you valuable. Know what part of your process is the relationship, and protect it. Automate the logistics around it, not the relationship itself.</p>

    <h3>3. You have not solved the problem manually first</h3>
    <p>The most dangerous automation project is one that is trying to solve a problem the owner has not actually tried to solve by hand first. If you do not know how a working order intake process feels in practice — because you have never had one — you will not be able to evaluate whether the automated version is working. Do it manually for one month. Log everything. Then automate what you have proven works.</p>

    <h2>Where to Go From Here</h2>
    <p>If you read the five green signs and recognised your business — you are ready. The next step is mapping your process: writing down every step, every input, every output, every decision point in your operations. Once that map exists, the automation build is mostly technical execution.</p>
    <p>If you read the three red signs and felt called out — that is not a failure. It is information. It tells you what to fix before you build. A business that spends six weeks getting operationally clear before touching any tool will get ten times more value from automation than one that rushes in.</p>

    <div style="margin-top:56px;padding-top:40px;border-top:1px solid var(--g5);display:flex;gap:16px;flex-wrap:wrap;align-items:center;">

      <a href="/blog" data-route="/blog" class="btn-ghost">← All Articles</a>
    </div>
  </div>`;
}

function initQuiz() {
  const state = { current: 0, answers: [] };

  function render() {
    const container = document.getElementById('quiz-content');
    if (!container) return;

    if (state.current >= QUESTIONS.length) {
      showResult(container);
      return;
    }

    const q = QUESTIONS[state.current];
    const progress = ((state.current) / QUESTIONS.length) * 100;
    document.getElementById('quiz-progress').style.width = progress + '%';

    const letters = ['A', 'B', 'C'];
    container.innerHTML = `
      <div class="quiz-q-num">Question ${state.current + 1} of ${QUESTIONS.length}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((opt, i) => `
          <div class="quiz-option ${state.answers[state.current] === i ? 'selected' : ''}" data-idx="${i}">
            <span class="quiz-option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="quiz-nav">
        <button class="quiz-btn" id="quiz-back" ${state.current === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
        <button class="quiz-btn primary" id="quiz-next" ${state.answers[state.current] === undefined ? 'disabled style="opacity:0.4"' : ''}>
          ${state.current === QUESTIONS.length - 1 ? 'See My Score →' : 'Next →'}
        </button>
      </div>`;

    container.querySelectorAll('.quiz-option').forEach(opt => {
      opt.addEventListener('click', () => {
        state.answers[state.current] = parseInt(opt.dataset.idx);
        render();
      });
    });

    document.getElementById('quiz-next').addEventListener('click', () => {
      if (state.answers[state.current] !== undefined) { state.current++; render(); }
    });
    document.getElementById('quiz-back').addEventListener('click', () => {
      if (state.current > 0) { state.current--; render(); }
    });
  }

  function showResult(container) {
    document.getElementById('quiz-progress').style.width = '100%';
    const totalScore = state.answers.reduce((sum, ans, i) => sum + (QUESTIONS[i].scores[ans] || 0), 0);
    const max = 30;

    let tier, desc, recs;
    if (totalScore <= 10) {
      tier = 'Operations First.';
      desc = 'Your business is not ready for automation yet — and that is not a problem, it is just where you are. The good news: the gap between now and ready is mostly documentation, not tools. Spend the next 30 days writing down exactly how your business works. Map every step a customer takes from first contact to fulfilled order. Once that exists, we can build on it.';
      recs = ['Write down your complete order process — every step, every input, every output', 'Fix your pricing: make it consistent, documented, and shareable', 'Start manually logging every customer transaction in a basic spreadsheet', 'Get your product or service offering stable before automating anything'];
    } else if (totalScore <= 20) {
      tier = 'Ready to Start.';
      desc = 'You have the foundations that make automation possible. Your processes are mostly consistent, your volume justifies the investment, and you are willing to change how things work. The right move now is a single, focused first project — not a complete overhaul. Pick one problem that is costing you the most time and build one system to solve it.';
      recs = ['Pick your single biggest time drain and automate only that first', 'Build a Tally form to replace your WhatsApp order intake', 'Set up a Google Sheet with a structured customer log', 'Book a discovery call to map which system to build first'];
    } else {
      tier = 'Build Now.';
      desc = 'Your operations are solid enough to support full automation. You have consistent processes, real volume, and the mindset to commit to new systems. The opportunity cost of staying manual at your level is real — every week without infrastructure is revenue and time you are not recovering. The infrastructure conversation is overdue.';
      recs = ['Build your full order intake system (form → sheet → receipt → WhatsApp confirmation)', 'Automate your content output with an AI pipeline', 'Set up a complete customer database with retargeting logic', 'Book a call to scope the full business automation build'];
    }

    container.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-score-ring">
          <div class="quiz-score-num">${totalScore}</div>
          <div class="quiz-score-denom">out of ${max}</div>
        </div>
        <div class="quiz-result-title">${tier}</div>
        <div class="quiz-result-desc">${desc}</div>
        <div class="quiz-recommendations">
          <div class="quiz-rec-title">Your Recommended Next Steps</div>
          ${recs.map((r, i) => `
            <div class="quiz-rec-item">
              <span class="quiz-rec-num">0${i+1}</span>
              <span>${r}</span>
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:16px;">
          <a href="/#contact" data-anchor="contact" class="btn-fill">Book a Free Call</a>
          <button class="btn-ghost" onclick="initQuiz()">Retake Quiz</button>
        </div>
      </div>`;
  }

  render();
}

    <p>Most small businesses in Nigeria are unknowing data controllers. They collect personal data, they process it, they store it — and they have no privacy policy, no data retention schedule, no lawful basis documented, and no awareness that any of this is regulated. The Nigeria Data Protection Act 2023 changed the compliance landscape significantly. The question is whether the businesses it covers know that yet.</p>

      <div class="dp-card">
        <div class="dp-card-label">The Regulator</div>
        <div class="dp-card-title">Nigeria Data Protection Commission (NDPC)</div>

    <h3>AI Governance in the Nigerian Context</h3>

function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function closeMobileMenu() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('mobileMenu').classList.remove('open');
  document.body.style.overflow = '';
}

/* Hamburger */
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
  document.body.style.overflow = document.getElementById('mobileMenu').classList.contains('open') ? 'hidden' : '';
});

/* Scroll progress */
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
  document.getElementById('spb').style.width = Math.min(pct, 100) + '%';
}, { passive: true });

/* Custom cursor */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
});
(function animRing() {
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
  requestAnimationFrame(animRing);
})();
document.addEventListener('mouseover', e => {
  if (e.target.closest('a,button,.lab-card,.service-card,.blog-card,.quiz-option,.blog-listing-item')) {
    cursor.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%) scale(2)`;
    ring.style.width = '48px'; ring.style.height = '48px'; ring.style.opacity = '0.8';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('a,button,.lab-card,.service-card,.blog-card,.quiz-option,.blog-listing-item')) {
    cursor.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%) scale(1)`;
    ring.style.width = '32px'; ring.style.height = '32px'; ring.style.opacity = '0.5';
  }
});
if ('ontouchstart' in window) {
  cursor.style.display = 'none'; ring.style.display = 'none'; document.body.style.cursor = 'auto';
}
